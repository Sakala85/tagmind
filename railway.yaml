# Railway configuration for both services
# Deploy with: railway up

services:
  # Backend MCP Server
  api:
    build:
      dockerfile: Dockerfile
    ports:
      - 8080
    healthcheck:
      path: /health
      port: 8080
    env:
      - PORT=8080
      - BASE_URL=${{RAILWAY_PUBLIC_DOMAIN}}
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - JWT_SECRET
      - LOG_LEVEL=info

  # Frontend Web
  web:
    build:
      dockerfile: web/Dockerfile
    ports:
      - 3000
    healthcheck:
      path: /api/health
      port: 3000
    env:
      - NODE_ENV=production
      - NEXTAUTH_SECRET
      - NEXTAUTH_URL=https://${{RAILWAY_PUBLIC_DOMAIN}}
      - NEXT_PUBLIC_MCP_SERVER_URL=https://${{RAILWAY_PUBLIC_DOMAIN}}
      - DATABASE_URL=file:./data/dev.db
      - GTM_GOOGLE_CLIENT_ID
      - GTM_GOOGLE_CLIENT_SECRET
      - MCP_SERVER_URL
      - GOOGLE_API_KEY
      - MINIMAX_API_KEY
